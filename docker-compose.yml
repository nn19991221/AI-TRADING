version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: ai_trading_postgres
    environment:
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader
      POSTGRES_DB: trading
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U trader -d trading']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
